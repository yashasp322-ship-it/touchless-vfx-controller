<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic VFX Engine | Touchless Control</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <!-- Professional Glassmorphic UI -->
    <div class="ui-container" id="ui_panel">
        <div class="drag-handle" id="drag_handle" title="Drag to move">
            <div class="drag-dot"></div>
            <div class="drag-dot"></div>
            <div class="drag-dot"></div>
            <div class="drag-dot"></div>
            <div class="drag-dot"></div>
        </div>
        <div class="ui-header">
            <h1>VFX Controller</h1>
        </div>

        <div class="power-controls">
            <button class="power-btn active" data-power="fire_ice">
                <span class="icon">🔥❄️</span> <span class="btn-text">Fire & Ice</span>
            </button>
            <button class="power-btn" data-power="lightning">
                <span class="icon">⚡</span> <span class="btn-text">Lightning</span>
            </button>
            <button class="power-btn" data-power="red_blue">
                <span class="icon">🔴🔵</span> <span class="btn-text">Dark Energy</span>
            </button>
            <div class="separator"></div>
            <button class="record-btn" id="record_btn">
                <span class="icon">⏺️</span> <span class="btn-text" id="record_text">Record</span>
            </button>
        </div>

        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">Initializing Camera...</span>
        </div>
    </div>

    <!-- MediaPipe Hand Tracking Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <!-- Application Logic -->
    <script src="main.js"></script>
</body>

</html>
